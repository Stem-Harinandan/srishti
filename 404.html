<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 | Srishti 2K26</title>

    <link rel="icon" type="image/png" href="/assets/logo.png">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Inter,sans-serif;
        }

        body{
            min-height:100vh;
            background:#050505;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            position:relative;
        }

        .bg-glow{
            position:absolute;
            width:600px;
            height:600px;
            background:radial-gradient(circle,
            rgba(130,100,255,.25) 0%,
            rgba(130,100,255,0) 70%);
            filter:blur(80px);
        }

        .container{
            text-align:center;
            z-index:2;
            max-width:700px;
            padding:2rem;
        }

        .logo{
            width:120px;
            margin-bottom:2rem;
            opacity:.9;
        }

        .code{
            font-size:8rem;
            font-weight:800;
            line-height:1;
            background:linear-gradient(
                90deg,
                #ffffff,
                #bcaeff,
                #ffffff
            );
            -webkit-background-clip:text;
            color:transparent;
        }

        h1{
            margin-top:1rem;
            font-size:2rem;
            font-weight:700;
        }

        p{
            margin-top:1rem;
            color:#b8b8b8;
            line-height:1.7;
        }

        .buttons{
            margin-top:2rem;
            display:flex;
            gap:1rem;
            justify-content:center;
            flex-wrap:wrap;
        }

        a{
            text-decoration:none;
        }

        .btn{
            padding:14px 28px;
            border-radius:12px;
            transition:.3s;
            font-weight:600;
        }

        .primary{
            background:white;
            color:black;
        }

        .primary:hover{
            transform:translateY(-2px);
        }

        .secondary{
            border:1px solid rgba(255,255,255,.15);
            color:white;
            background:rgba(255,255,255,.04);
        }

        .secondary:hover{
            background:rgba(255,255,255,.08);
        }

        .quote{
            margin-top:3rem;
            color:#7f7f7f;
            font-size:.9rem;
            letter-spacing:.1em;
            text-transform:uppercase;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">

    <img src="/assets/logo.png" alt="Srishti 2K26 Logo" class="logo">

    <div class="code">404</div>

    <h1>The page has vanished into creation.</h1>

    <p>
        The page you're looking for doesn't exist,
        may have been moved, or was never part of
        the Srishti universe.
    </p>

    <div class="buttons">
        <a href="/">
            <div class="btn primary">Return Home</div>
        </a>

        <a href="/pages/about.html">
            <div class="btn secondary">About Srishti</div>
        </a>
    </div>

    <div class="quote">
        Creativity begins where the map ends.
    </div>

</div>

</body>
</html>
